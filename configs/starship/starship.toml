add_newline = true

format = """
[╭─](bold #F5A9B8) $directory$git_branch$git_status$nodejs$python$rust$golang$cmd_duration
[╰─](bold #F5A9B8)[♡ ](bold #F5A9B8)"""

[character]
disabled = true

[directory]
style = "bold #B5C8FF"
truncation_length = 3
truncate_to_repo = true
read_only = " 󰌾"
format = "[$path]($style)[$read_only](#F5A9B8) "

[git_branch]
symbol = "✦ "
format = "[$symbol$branch]($style) "
style = "bold #D4B8FF"

[git_status]
format = '([$all_status$ahead_behind]($style) )'
style = "#FFD3A5"
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"
modified = "~${count}"
untracked = "?${count}"
staged = "+${count}"
deleted = "✘${count}"

[nodejs]
symbol = "⬡ "
format = "[$symbol$version]($style) "
style = "#A8E6CF"
detect_files = ["package.json", ".nvmrc", ".node-version"]

[python]
symbol = "🐍 "
format = "[$symbol$version]($style) "
style = "#FFD3A5"

[rust]
symbol = "⚙ "
format = "[$symbol$version]($style) "
style = "#FFB5A0"

[golang]
symbol = "🐹 "
format = "[$symbol$version]($style) "
style = "#A8E6CF"

[cmd_duration]
min_time = 2000
format = "[✧ $duration](#FFD3A5) "
